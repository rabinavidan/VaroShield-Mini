services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: varoshield
      POSTGRES_PASSWORD: varoshield
      POSTGRES_DB: varoshield
    ports:
      - "5434:5432"
    volumes:
      - varoshield_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U varoshield"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql://varoshield:varoshield@postgres:5432/varoshield
    ports:
      - "8010:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 5s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8010
    environment:
      VITE_API_BASE_URL: http://localhost:8010
    ports:
      - "3010:3000"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  varoshield_pgdata:
