[pytest]
markers =
    api: API-level tests
    ui: UI-level tests via Playwright
    smoke: fast smoke checks for CI gating
    regression: broader regression coverage
    permissions: role/permission validation tests
    scan: async scan job tests
    risks: risk alert logic tests

testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
