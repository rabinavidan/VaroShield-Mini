name: Automation CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  automation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and start app with Docker Compose
        run: docker compose up -d --build

      - name: Wait for backend health endpoint
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health; then
              echo "Backend is healthy"
              exit 0
            fi
            echo "Waiting for backend... ($i)"
            sleep 2
          done
          echo "Backend did not become healthy in time"
          exit 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install automation dependencies
        run: pip install -r automation/requirements.txt

      - name: Install Playwright browsers
        run: playwright install --with-deps chromium

      - name: Run API smoke tests
        run: pytest automation/tests/api -m "smoke or api" --alluredir=allure-results
        env:
          API_BASE_URL: http://localhost:8000
          UI_BASE_URL: http://localhost:3000

      - name: Run UI smoke tests
        run: pytest automation/tests/ui -m "smoke or ui" --alluredir=allure-results
        env:
          API_BASE_URL: http://localhost:8000
          UI_BASE_URL: http://localhost:3000

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results

      - name: Generate Allure report
        if: always()
        run: |
          if [ -d allure-results ]; then
            curl -o /tmp/allure.tgz -Ls https://github.com/allure-framework/allure2/releases/download/2.32.0/allure-2.32.0.tgz
            tar -zxf /tmp/allure.tgz -C /tmp
            /tmp/allure-2.32.0/bin/allure generate allure-results -o allure-report --clean
          else
            mkdir -p allure-report
            echo "<html><body><h1>No Allure results were produced (an earlier step failed before tests ran).</h1></body></html>" > allure-report/index.html
          fi

      - name: Upload Pages artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report

      - name: Show docker logs on failure
        if: failure()
        run: docker compose logs

  deploy-report:
    needs: automation
    if: always() && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy Allure report to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Add report link to job summary
        run: |
          echo "### Allure report" >> "$GITHUB_STEP_SUMMARY"
          echo "[View the latest Allure report](${{ steps.deployment.outputs.page_url }})" >> "$GITHUB_STEP_SUMMARY"
